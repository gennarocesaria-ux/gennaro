<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Mia Pagina Web</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:900px;
    background:white;
    border-radius:20px;
    padding:40px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}

h1{
    color:#333;
    margin-bottom:15px;
    font-size:3em;
}

p{
    color:#666;
    margin-bottom:25px;
    font-size:18px;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#4facfe;
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0077ff;
    transform:scale(1.05);
}

.card{
    margin-top:40px;
    padding:25px;
    background:#f5f5f5;
    border-radius:15px;
}

#orologio{
    font-size:28px;
    color:#0077ff;
    margin-top:20px;
    font-weight:bold;
}

footer{
    margin-top:40px;
    color:#888;
}
</style>

</head>
<body>

<div class="container">

<h1>Benvenuto!</h1>

<p>Questa è una pagina web completamente personalizzabile.</p>

<button onclick="saluta()">Cliccami</button>

<div class="card">
<h2>Orologio in tempo reale</h2>
<div id="orologio"></div>
</div>

<footer>
Creato con HTML, CSS e JavaScript
</footer>

</div>

<script>

function saluta(){
    alert("Ciao! Grazie per aver visitato questa pagina.");
}

function aggiornaOra(){

    const data = new Date();

    let h = String(data.getHours()).padStart(2,'0');
    let m = String(data.getMinutes()).padStart(2,'0');
    let s = String(data.getSeconds()).padStart(2,'0');

    document.getElementById("orologio").innerHTML =
    h + ":" + m + ":" + s;
}

setInterval(aggiornaOra,1000);
aggiornaOra();

</script>

</body>
</html>
